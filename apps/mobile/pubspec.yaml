name: pocusapp
description: Pocusapp 2.0 – POCUS learning platform
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  # Pacotes unificados com as versões mais recentes
  supabase_flutter: ^2.5.4
  powersync: ^1.18.0
  video_player: ^2.11.0
  path_provider: ^2.1.5
  path: ^1.9.1
  connectivity_plus: ^6.0.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  freezed_annotation: ^2.4.1
  go_router: ^14.2.0
  sqlite3_flutter_libs: ^0.5.41
  flutter_markdown: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true