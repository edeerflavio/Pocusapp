bucket_definitions:
  # ------------------------------------------------------------------
  # Global content buckets (read-only on client, same data for everyone)
  # ------------------------------------------------------------------
  global_content:
    data:
      - SELECT id, slug, title_pt, title_es, body_pt, body_es, is_premium, status, updated_at
        FROM drugs
        WHERE status = 'published'

      - SELECT id, slug, title_pt, title_es, body_pt, body_es, is_premium, status, updated_at
        FROM diseases
        WHERE status = 'published'

      - SELECT id, slug, title_pt, title_es, body_pt, body_es, is_premium, status, updated_at
        FROM protocols
        WHERE status = 'published'

      - SELECT id, category, title_pt, title_es, body_pt, body_es, is_premium, status, updated_at
        FROM pocus_items
        WHERE status = 'published'

      - SELECT id, owner_type, owner_id, kind, path, thumb_path, updated_at
        FROM media_assets

      - SELECT id, slug, title, scenario, specialty, summary, content_json, tags, source, version, status, updated_at
        FROM clinical_guides
        WHERE status = 'published'